# 服务配置
spring:
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 5
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Nacos 服务发现
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        register-enabled: true
        ip: ${GUARDRAIL_SERVICE_IP:}
        port: ${server.port}
        weight: 1.0
        metadata:
          version: 1.0.0
          zone: ${ZONE:default}

# AI 安全防护服务配置
ggl:
  service:
    guardrail:
      # 内容审核配置
      content-moderation:
        # 审核级别
        moderation-level: STRICT
        # 支持的审核级别
        supported-levels: STRICT,MODERATE,PERMISSIVE
        # 敏感词检测
        sensitive-word-check: true
        # 正则表达式检测
        regex-check: true
        # AI 模型检测
        ai-model-check: true
        # 缓存时间（秒）
        cache-ttl: 3600
      
      # Prompt 注入防护配置
      prompt-injection:
        # 防护级别
        protection-level: HIGH
        # 支持的防护级别
        supported-levels: HIGH,MEDIUM,LOW
        # 关键词检测
        keyword-detection: true
        # 语义检测
        semantic-detection: true
        # 相似度检测
        similarity-detection: true
        # 相似度阈值
        similarity-threshold: 0.8
        # 最大检测长度
        max-detection-length: 1000
      
      # AI 输出评测配置
      ai-evaluation:
        # 评测维度
        evaluation-dimensions: ACCURACY,RELEVANCE,SAFETY,COHERENCE
        # 默认评测模型
        default-model: GPT_4
        # 支持的评测模型
        supported-models: GPT_4,GPT_3_5_TURBO,CLAUDE_3
        # 评测阈值
        evaluation-threshold: 0.7
        # 自动评测
        auto-evaluation: true
        # 评测缓存时间（秒）
        evaluation-cache-ttl: 86400
      
      # 安全策略配置
      security-policy:
        # 默认策略
        default-policy: DEFAULT
        # 支持的策略
        supported-policies: DEFAULT,STRICT,PERMISSIVE,CUSTOM
        # 策略缓存时间（秒）
        policy-cache-ttl: 3600
        # 策略热加载
        policy-hot-reload: true
      
      # 监控配置
      monitoring:
        # 监控开关
        enabled: true
        # 监控指标
        metrics: REQUEST_COUNT,BLOCK_COUNT,AVG_RESPONSE_TIME,ERROR_RATE
        # 监控数据保留时间（天）
        retention-days: 30
        # 告警阈值
        alert-threshold: 0.1

# LangChain4j 配置
langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    timeout: 60s
    log-requests: true
    log-responses: true

