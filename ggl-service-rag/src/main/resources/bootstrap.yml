# Spring Boot 配置
spring:
  application:
    name: ggl-service-rag
  profiles:
    active: dev
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml?refreshEnabled=true
      - optional:nacos:common.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:redis.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:ai.yaml?group=DEFAULT_GROUP&refreshEnabled=true

  # Redis 配置（本地配置，避免依赖Nacos）
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      database: 4
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Nacos 配置中心
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        file-extension: yaml
        prefix: ${spring.application.name}
        refresh-enabled: true
        # Nacos 认证配置
        username: nacos
        password: nacos
        shared-configs:
          - data-id: common.yaml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: redis.yaml
            group: DEFAULT_GROUP
            refresh: true
          - data-id: ai.yaml
            group: DEFAULT_GROUP
            refresh: true

  # 日志配置
  logging:
    level:
      com.ggl: debug
      dev.langchain4j: debug
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
      file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# 服务端口
server:
  port: 8084

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
