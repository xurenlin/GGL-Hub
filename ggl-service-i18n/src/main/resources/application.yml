# 服务配置
spring:
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 3
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Nacos 服务发现
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        register-enabled: true
        ip: ${I18N_SERVICE_IP:}
        port: ${server.port}
        weight: 1.0
        metadata:
          version: 1.0.0
          zone: ${ZONE:default}

  # Thymeleaf 配置
  thymeleaf:
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8
    cache: false
    check-template: true
    check-template-location: true
    servlet:
      content-type: text/html

# 国际化服务配置
ggl:
  service:
    i18n:
      # 语言配置
      language:
        # 支持的语言
        supported-languages: zh-CN,en-US,ja-JP,ko-KR,de-DE,fr-FR,es-ES,ru-RU
        # 默认语言
        default-language: zh-CN
        # 语言检测超时（毫秒）
        detection-timeout: 5000
      
      # 翻译配置
      translation:
        # 默认翻译提供商
        default-provider: GOOGLE
        # 支持的翻译提供商
        supported-providers: GOOGLE,BAIDU,YOUDAO,DEEPL
        # 缓存时间（秒）
        cache-ttl: 86400
        # 批量翻译大小
        batch-size: 50
        # 最大文本长度
        max-text-length: 5000
      
      # 面单模板配置
      waybill:
        # 模板目录
        template-dir: classpath:/templates/waybill/
        # 支持的格式
        supported-formats: PDF,PNG,JPG,HTML
        # 默认格式
        default-format: PDF
        # 图片质量（1-100）
        image-quality: 90
        # 默认DPI
        default-dpi: 300
      
      # 资源文件配置
      resource:
        # 资源文件目录
        resource-dir: classpath:/i18n/
        # 默认资源文件
        default-resource: messages
        # 缓存时间（秒）
        cache-ttl: 3600
        # 热加载
        hot-reload: true

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh-CN
    enable-swagger-models: true
    enable-document-manage: true
    enable-version: true
    enable-author: true
    enable-request-cache: true
    enable-filter-multipart-api-method-type: POST
    enable-filter-multipart-apis: false
    enable-request-params: true
    enable-response-params: true
    enable-host: true
    enable-host-text: http://localhost:${server.port}
    enable-footer: true
    enable-footer-custom: true
    footer-custom-content: GGL-Hub 国际化微服务 API 文档
    enable-search: true
    enable-open-api: true
    enable-group: true

# 日志配置
logging:
  level:
    com.ggl.i18n: debug
    org.springframework.web: info
