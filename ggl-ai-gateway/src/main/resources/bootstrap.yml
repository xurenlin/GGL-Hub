# Spring Boot 配置
spring:
  application:
    name: ggl-ai-gateway
  profiles:
    active: dev
  
  # 使用 import 方式导入 Nacos 配置
  config:
    import:
      - optional:nacos:${spring.application.name}.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:common.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:redis.yaml?group=DEFAULT_GROUP&refreshEnabled=true
      - optional:nacos:ai.yaml?group=DEFAULT_GROUP&refreshEnabled=true

  # 只需要配置 Nacos 服务器地址（不需要 config 节点）
  cloud:
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      username: nacos
      password: nacos
      config:
        enabled: true  # 启用配置中心

  # 日志配置
  logging:
    level:
      com.ggl: debug
      dev.langchain4j: debug
    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
      file: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# 服务端口
server:
  port: 8086

# 管理端点
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always