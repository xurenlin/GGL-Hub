# 服务配置
spring:
  # Redis 配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 6
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-wait: -1ms
          max-idle: 8
          min-idle: 0

  # Nacos 服务发现
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:}
        group: ${NACOS_GROUP:DEFAULT_GROUP}
        register-enabled: true
        ip: ${AI_GATEWAY_IP:}
        port: ${server.port}
        weight: 1.0
        metadata:
          version: 1.0.0
          zone: ${ZONE:default}

  # WebSocket 配置
  websocket:
    enabled: true
    path: /ws
    allowed-origins: "*"
    message-size-limit: 65536
    send-time-limit: 10000
    send-buffer-size-limit: 524288

# AI 编排网关服务配置
ggl:
  service:
    ai:
      # LLM 调度配置
      llm-scheduler:
        # 默认调度策略
        default-strategy: ROUND_ROBIN
        # 支持的调度策略
        supported-strategies: ROUND_ROBIN,LOAD_BALANCING,COST_OPTIMIZATION,PERFORMANCE
        # 支持的 LLM 提供商
        supported-providers: OPENAI,ANTHROPIC,AZURE,OLLAMA,HUGGING_FACE
        # 故障转移
        failover-enabled: true
        # 重试次数
        retry-count: 3
        # 超时时间（毫秒）
        timeout: 30000
      
      # Agent 编排配置
      agent-orchestration:
        # 默认 Agent
        default-agent: CHAT_AGENT
        # 支持的 Agent
        supported-agents: CHAT_AGENT,ORDER_AGENT,LOGISTICS_AGENT,CUSTOMER_SERVICE_AGENT
        # Agent 超时时间（毫秒）
        agent-timeout: 60000
        # 最大对话轮次
        max-conversation-turns: 20
        # 上下文保留轮次
        context-retention-turns: 10
      
      # 智能客服配置
      customer-service:
        # 默认客服模型
        default-model: GPT_4
        # 支持的客服模型
        supported-models: GPT_4,GPT_3_5_TURBO,CLAUDE_3
        # 多语言支持
        multilingual-support: true
        # 情感分析
        sentiment-analysis: true
        # 意图识别
        intent-recognition: true
        # 自动转人工阈值
        auto-transfer-threshold: 0.8
      
      # 流式响应配置
      streaming:
        # 流式响应开关
        enabled: true
        # 流式响应超时（毫秒）
        timeout: 60000
        # 心跳间隔（毫秒）
        heartbeat-interval: 30000
        # 最大连接数
        max-connections: 1000
      
      # 缓存配置
      cache:
        # 对话缓存
        conversation-cache: true
        # 缓存时间（秒）
        cache-ttl: 3600
        # 最大缓存大小
        max-cache-size: 10000

# LangChain4j 配置
langchain4j:
  open-ai:
    api-key: ${OPENAI_API_KEY:}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    timeout: 60s
    log-requests: true
    log-responses: true
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com}
    timeout: 60s
  azure-open-ai:
    endpoint: ${AZURE_OPENAI_ENDPOINT:}
    api-key: ${AZURE_OPENAI_API_KEY:}
    deployment-name: ${AZURE_OPENAI_DEPLOYMENT_NAME:}
    timeout: 60s
  ollama:
    base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    model-name: ${OLLAMA_MODEL_NAME:llama2}
    timeout: 60s
  hugging-face:
    api-key: ${HUGGING_FACE_API_KEY:}
    model-id: ${HUGGING_FACE_MODEL_ID:}
    timeout: 60s

# WebSocket 配置
websocket:
  path: /ws
  allowed-origins: "*"
  message-size-limit: 65536
  send-time-limit: 10000
  send-buffer-size-limit: 524288

# Knife4j 配置
knife4j:
  enable: true
  setting:
    language: zh-CN
    enable-swagger-models: true
    enable-document-manage: true
    enable-version: true
    enable-author: true
    enable-request-cache: true
    enable-filter-multipart-api-method-type: POST
    enable-filter-multipart-apis: false
    enable-request-params: true
    enable-response-params: true
    enable-host: true
    enable-host-text: http://localhost:${server.port}
    enable-footer: true
    enable-footer-custom: true
    footer-custom-content: GGL-Hub AI 编排与网关服务 API 文档
    enable-search: true
    enable-open-api: true
    enable-group: true

# 日志配置
logging:
  level:
    com.ggl.ai: debug
    dev.langchain4j: info
    org.springframework.web: info
    org.springframework.web.socket: info
